<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Disable cookies site-wide
      try {
        Object.defineProperty(document, 'cookie', {
          get: function() {
            console.warn('Access to document.cookie is disabled.');
            return '';
          },
          set: function(val) {
            console.warn('Setting document.cookie is disabled.');
            return '';
          },
          configurable: false
        });
      } catch (e) {
        console.error('Failed to disable cookies:', e);
      }

      // Disable navigator plugins site-wide
      try {
        Object.defineProperty(navigator, 'plugins', {
          get: function() {
            const emptyPlugins = [];
            emptyPlugins.item = function() { return null; };
            emptyPlugins.namedItem = function() { return null; };
            emptyPlugins.refresh = function() {};
            return emptyPlugins;
          },
          configurable: false
        });
        Object.defineProperty(navigator, 'mimeTypes', {
          get: function() {
            const emptyMimeTypes = [];
            emptyMimeTypes.item = function() { return null; };
            emptyMimeTypes.namedItem = function() { return null; };
            return emptyMimeTypes;
          },
          configurable: false
        });
      } catch (e) {
        console.error('Failed to disable plugins:', e);
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>AmethIntel | Interconnected Biotech Intelligence</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
